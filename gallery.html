    /* ======= Gallery Header (matching destination) ======= */
    .gallery-header {
      background: url("https://images.unsplash.com/photo-1505761671935-60b3a7427bad") center/cover no-repeat;
      height: 75vh;
      /* margin-top: 70px; */

    }

    .gallery-header h1 {
      font-size: 3rem;

    }

    .gallery-header p {
      font-size: 1.2rem;
      opacity: 0.9;
    }


    /* TRAVEL GALLERY */

.travel-gallery{
padding:60px 40px;
background:#f5f7fa;
}

.gallery-grid{
column-count:3;
column-gap:20px;
}

.gallery-item{
position:relative;
margin-bottom:20px;
overflow:hidden;
border-radius:10px;
cursor:pointer;
}

.gallery-item img{
width:100%;
display:block;
border-radius:10px;
transition:0.4s;
}

.gallery-item:hover img{
transform:scale(1.08);
}

.gallery-overlay{
position:absolute;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,0.6);
color:white;
padding:10px;
font-size:16px;
text-align:center;
opacity:0;
transition:0.3s;
}

.gallery-item:hover .gallery-overlay{
opacity:1;
}

/* responsive */

@media(max-width:900px){
.gallery-grid{
column-count:2;
}
}

@media(max-width:600px){
.gallery-grid{
column-count:1;
}
} 
    
  </style>
</head>
